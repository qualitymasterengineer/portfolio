<aside class="sidebar" data-sidebar>

      <div class="sidebar-info">

        <figure class="avatar-box">
          <img src="./assets/images/Isotipo.png" data-i18n-alt="sidebar_name" alt="" width="100">
        </figure>

        <div class="info-content">
          <h1 class="name" data-i18n="sidebar_name" data-i18n-title="sidebar_name"></h1>

          <p class="title" data-i18n="sidebar_subtitle"></p>
        </div>

        <button class="info_more-btn" data-sidebar-btn>
          <span data-i18n="sidebar_show_contacts"></span>

          <ion-icon name="chevron-down"></ion-icon>
        </button>

      </div>

      <div class="sidebar-info_more">

        <div class="separator"></div>

        <ul class="contacts-list">

          <li class="contact-item">

            <div class="icon-box">
              <svg class="sidebar-icon" aria-hidden="true" focusable="false"><use href="#icon-sidebar-mail"></use></svg>
            </div>

            <div class="contact-info">
              <p class="contact-title" data-i18n="sidebar_email"></p>

              <a href="#" class="contact-link" data-contact="email"></a>
            </div>

          </li>

          <li class="contact-item">

            <div class="icon-box">
              <svg class="sidebar-icon" aria-hidden="true" focusable="false"><use href="#icon-sidebar-phone"></use></svg>
            </div>

            <div class="contact-info">
              <p class="contact-title" data-i18n="sidebar_phone"></p>

              <a href="#" class="contact-link" data-contact="phone"></a>
            </div>

          </li>

          <li class="contact-item">

            <div class="icon-box">
              <svg class="sidebar-icon" aria-hidden="true" focusable="false"><use href="#icon-sidebar-calendar"></use></svg>
            </div>

            <div class="contact-info">
              <p class="contact-title" data-i18n="sidebar_experience"></p>

              <time datetime="1982-06-23" data-i18n="sidebar_experience_value"></time>
            </div>

          </li>

          <li class="contact-item">

            <div class="icon-box">
              <svg class="sidebar-icon" aria-hidden="true" focusable="false"><use href="#icon-sidebar-location"></use></svg>
            </div>

            <div class="contact-info">
              <p class="contact-title" data-i18n="sidebar_location"></p>

              <address data-i18n="sidebar_address"></address>
            </div>

          </li>

        </ul>
